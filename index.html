<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Listen-Spiel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #setup, #game { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        .hidden { display: none !important; }
        
        /* Kategorie & Host Bereich */
        .category-header { font-size: 1.8em; text-align: center; font-weight: bold; margin-bottom: 10px; color: #222; }
        #host-controls { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #2e7d32; }

        /* Spieler Grid */
        #player-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .player-block { border: 2px solid #ddd; padding: 15px; border-radius: 8px; background: #fff; transition: all 0.3s; min-width: 0; }
        .player-block.active { border-color: #007bff; background: #f0f7ff; transform: scale(1.02); }
        .player-block.deactivated { background: #ffe5e5; border-color: #ff4d4d; opacity: 0.7; }
        .player-block.deactivated .player-name { text-decoration: line-through; color: #cc0000; }

        /* Spieler Name & Veto Button */
        .player-name { font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .report-btn { width: auto; margin-left: 10px; font-size: 0.7em; padding: 4px 8px; border: none; border-radius: 4px; background: #ffc107; cursor: pointer; flex-shrink: 0; }
        .report-btn.active { background: #dc3545; color: white; }

        /* Antworten Liste */
        .answer-list { max-height: 180px; overflow-y: auto; }
        .answer-entry { 
            background: #f1f3f5; margin-bottom: 5px; padding: 6px 10px; border-radius: 4px; 
            font-size: 0.95em; border-left: 4px solid #007bff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Formularelemente */
        input, button { padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #send-btn { background: #007bff; }
        .host-btn { background: #2e7d32; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Spiel beitreten</h2>
        <input type="text" id="username" placeholder="Dein Name...">
        <button onclick="join()">Start</button>
    </div>

    <div id="game" class="hidden">
        <div class="category-header">Kategorie: <span id="category-name">-</span></div>
        
        <div id="host-controls" class="hidden">
            <p style="margin:0 0 5px 0; font-size:0.8em; color:#2e7d32;"><b>Du bist der Host!</b></p>
            <input type="text" id="custom-category-input" placeholder="Neue Kategorie eintippen...">
            <button class="host-btn" onclick="changeCategory()">Kategorie ändern & Reset</button>
        </div>

        <div id="turn-info" style="text-align:center; font-weight:bold; color:#007bff; margin-bottom:10px;"></div>
        
        <div id="input-area">
            <input type="text" id="answer-input" placeholder="Deine Antwort...">
            <button id="send-btn" onclick="sendAnswer()">Abschicken</button>
        </div>

        <div id="player-container"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function join() {
            const name = document.getElementById('username').value;
            if(name.trim()) {
                socket.emit('joinGame', name.trim());
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
            }
        }

        function sendAnswer() {
            const input = document.getElementById('answer-input');
            if(input.value.trim()) {
                socket.emit('submitAnswer', input.value);
                input.value = "";
            }
        }

        function changeCategory() {
            const input = document.getElementById('custom-category-input');
            if(input.value.trim()) {
                socket.emit('setCategory', input.value.trim());
                input.value = "";
            }
        }

        function toggleReport(id) {
            socket.emit('toggleReport', id);
        }

        socket.on('updateState', (state) => {
            // 1. Kategorie anzeigen
            document.getElementById('category-name').innerText = state.currentCategoryName;

            // 2. Host-Check (Erster Spieler in der Liste)
            const isHost = state.players.length > 0 && state.players[0].id === socket.id;
            document.getElementById('host-controls').className = isHost ? "" : "hidden";

            // 3. Spieler-Blöcke bauen
            const container = document.getElementById('player-container');
            container.innerHTML = "";

            state.players.forEach((player, index) => {
                const isActive = index === state.activePlayerIndex;
                const isMe = player.id === socket.id;
                const hasReported = player.reports.includes(socket.id);

                const block = document.createElement('div');
                block.className = `player-block ${isActive ? 'active' : ''} ${player.isDeactivated ? 'deactivated' : ''}`;
                
                const answersHtml = player.answers.map(ans => {
                    const short = ans.length > 25 ? ans.substring(0, 25) + "..." : ans;
                    return `<div class="answer-entry" title="${ans}">${short}</div>`;
                }).join('');

                block.innerHTML = `
                    <div class="player-name">
                        <span>${player.name} ${isActive ? '🟢' : ''}</span>
                        ${!isMe ? `
                            <button class="report-btn ${hasReported ? 'active' : ''}" onclick="toggleReport('${player.id}')">
                                ${hasReported ? 'Veto weg' : 'Veto!'} (${player.reports.length})
                            </button>
                        ` : ''}
                    </div>
                    <div class="answer-list">${answersHtml}</div>
                `;
                container.appendChild(block);

                if (isActive && isMe) {
                    document.getElementById('turn-info').innerText = "DU bist dran!";
                    document.getElementById('answer-input').disabled = false;
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('answer-input').focus();
                } else if (isActive) {
                    document.getElementById('turn-info').innerText = player.name + " ist dran...";
                    document.getElementById('answer-input').disabled = true;
                    document.getElementById('send-btn').disabled = true;
                }
            });
        });

        // ENTER-Taste zum Senden
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendAnswer();
        });
        document.getElementById('custom-category-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') changeCategory();
        });
    </script>
</body>
</html>
