<!DOCTYPE html>
<html>
<body>
    <h1>Kategorie: <span id="category">---</span></h1>
    <div id="player-list"></div>
    <input id="answer-input" placeholder="Dein Begriff...">
    <button onclick="sendAnswer()">Abschicken</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function sendAnswer() {
          const input = document.getElementById('answer-input');
          socket.emit('submitAnswer', input.value);
          input.value = ""; // Feld leeren
        }

        socket.on('newAnswer', (data) => {
        const list = document.getElementById('player-list');
        const entry = document.createElement('p');
        entry.innerText = data.text; // Zeigt den Text an
        list.appendChild(entry);
      });
    </script>
</body>
</html>
