<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Game</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #setup, #game { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        .hidden { display: none !important; }
        
        /* Spieler-Blöcke Layout */
        #player-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .player-block { border: 2px solid #ddd; padding: 15px; border-radius: 8px; background: #fff; position: relative; transition: all 0.3s; }
        .player-block.active { border-color: #007bff; background: #f0f7ff; transform: scale(1.02); }
        
        /* --- NEU: Deaktiviert Style --- */
        .player-block.deactivated { background: #ffe5e5; border-color: #ff4d4d; opacity: 0.7; }
        .player-block.deactivated .player-name { text-decoration: line-through; color: #cc0000; }

        .player-name { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* --- NEU: Veto Button Style --- */
        .report-btn {
            width: auto;          /* Überschreibt die 100% Breite */
            margin-left: 15px;    /* Schafft Platz zum Namen */
            padding: 2px 8px;     /* Macht ihn etwas zierlicher */
            font-size: 0.7em;
            border: none;
            border-radius: 4px;
            background: #ffc107;
            cursor: pointer;
            flex-shrink: 0;       /* Verhindert, dass der Button gequetscht wird */
        }
        .report-btn.active { background: #dc3545; color: white; }

        .answer-list { max-height: 150px; overflow-y: auto; }
        .answer-entry { 
            background: #f1f3f5; margin-bottom: 5px; padding: 6px; border-radius: 4px; 
            font-size: 0.95em; border-left: 4px solid #007bff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        input, button { padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .category-header { font-size: 1.8em; text-align: center; color: #222; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="setup">
        <h2 style="margin-top:0">Willkommen!</h2>
        <input type="text" id="username" placeholder="Gib deinen Namen ein...">
        <button onclick="join()">Spiel beitreten</button>
    </div>

    <div id="game" class="hidden">
        <div class="category-header">Kategorie: <span id="category-name">Lädt...</span></div>
        <button onclick="nextCategory()" style="background: #28a745; margin-bottom: 20px;">Nächste Kategorie ➔</button>
        
        <div id="turn-info" style="text-align:center; margin-bottom:15px; font-weight:bold; color: #007bff;"></div>
        
        <div id="input-area">
            <input type="text" id="answer-input" placeholder="Deine Antwort tippen...">
            <button id="send-btn" onclick="sendAnswer()">Abschicken</button>
        </div>

        <div id="player-container"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const categories = ["Automarken", "Obstsorten", "Berufe", "Städte", "Tiere", "Farben"];

        function join() {
            const name = document.getElementById('username').value;
            if(name.trim()) {
                socket.emit('joinGame', name.trim());
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
            }
        }

        function sendAnswer() {
            const input = document.getElementById('answer-input');
            if(input.value.trim()) {
                socket.emit('submitAnswer', input.value);
                input.value = "";
            }
        }

        function nextCategory() {
            socket.emit('nextCategory');
        }

        function toggleReport(id) {
            socket.emit('toggleReport', id);
        }

        socket.on('updateState', (state) => {
            document.getElementById('category-name').innerText = categories[state.categoryIndex];
            const container = document.getElementById('player-container');
            container.innerHTML = "";

            state.players.forEach((player, index) => {
                const isActive = index === state.activePlayerIndex;
                const isMe = player.id === socket.id;
                const hasReported = player.reports.includes(socket.id);

                const block = document.createElement('div');
                block.className = `player-block ${isActive ? 'active' : ''} ${player.isDeactivated ? 'deactivated' : ''}`;
                
                // Antworten kürzen und auflisten
                const answersHtml = player.answers.map(ans => {
                    const short = ans.length > 25 ? ans.substring(0, 25) + "..." : ans;
                    return `<div class="answer-entry">${short}</div>`;
                }).join('');

                block.innerHTML = `
                    <div class="player-name">
                        <span>${player.name} ${isActive ? '🟢' : ''}</span>
                        ${!isMe ? `
                            <button class="report-btn ${hasReported ? 'active' : ''}" onclick="toggleReport('${player.id}')">
                                ${hasReported ? 'Veto weg' : 'Veto!'} (${player.reports.length})
                            </button>
                        ` : ''}
                    </div>
                    <div class="answer-list">${answersHtml}</div>
                `;
                container.appendChild(block);

                // Steuerung des Input-Feldes
                if (isActive && isMe) {
                    document.getElementById('turn-info').innerText = "DU bist dran!";
                    document.getElementById('answer-input').disabled = false;
                    document.getElementById('send-btn').disabled = false;
                    document.getElementById('answer-input').focus();
                } else if (isActive) {
                    document.getElementById('turn-info').innerText = player.name + " ist dran...";
                    document.getElementById('answer-input').disabled = true;
                    document.getElementById('send-btn').disabled = true;
                }
            });
        });

        // Abschicken mit Enter-Taste
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendAnswer();
        });
    </script>
</body>
</html>
